<!-- templates/register.html -->

{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Smart Ledger</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-logo">💼 Smart Ledger</div>
            <h2 class="auth-title">Create account</h2>
            <p class="auth-subtitle">Start tracking your expenses</p>

            {% if error %}
            <div class="message message-error">{{ error }}</div>
            {% endif %}

            <form method="POST" class="auth-form">
                {% csrf_token %}
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" placeholder="Choose a username" required autofocus>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Min 6 characters" required>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" name="confirm_password" placeholder="Repeat password" required>
                </div>
                <button type="submit" class="btn btn-submit auth-btn">Create Account</button>
            </form>

            <p class="auth-switch">
                Already have an account? <a href="/login/">Sign in</a>
            </p>
        </div>
    </div>
</body>

</html>
