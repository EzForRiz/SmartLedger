{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Smart Ledger</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

    <div class="container">

        <h1>Smart Ledger</h1>

        <!-- FORM -->
        <form id="expenseForm">

            <input type="date" id="date" required>
            <input type="time" id="time">

            <input type="number" id="amount" placeholder="Amount" required>

            <!-- CATEGORY -->
            <select id="useType" required>
                <option value="">Select Type</option>
                <option value="Personal">Personal</option>
                <option value="Professional">Professional</option>
            </select>

            <input type="text" id="whereSpent" placeholder="Where spent" required>

            <!-- PAYMENT METHOD (FIXED) -->
            <select id="paymentMethod" required>
                <option value="">Select Payment</option>
                <option value="cash">Cash</option>
                <option value="card">Card</option>
                <option value="easypaisa">Easypaisa</option>
                <option value="jazzcash">JazzCash</option>
            </select>

            <button type="submit">Add Expense</button>

        </form>

        <div id="message"></div>

        <!-- FILTER -->
        <select id="expenseTypeFilter">
            <option value="all">All</option>
            <option value="Personal">Personal</option>
            <option value="Professional">Professional</option>
        </select>

        <!-- INSIGHTS -->
        <div id="insightsBox"></div>

        <!-- TABLE -->
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Amount</th>
                    <th>Type</th>
                    <th>Where</th>
                    <th>Payment</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody id="expensesTableBody"></tbody>
        </table>

    </div>

    <script>
        const form = document.getElementById("expenseForm");
        const tableBody = document.getElementById("expensesTableBody");
        const filter = document.getElementById("expenseTypeFilter");
        const messageDiv = document.getElementById("message");

        function showMessage(msg) {
            messageDiv.textContent = msg;
            setTimeout(() => messageDiv.textContent = "", 2000);
        }

        // ✅ FETCH EXPENSES (FIXED ERROR HANDLING)
        async function fetchExpenses() {
            try {
                const res = await fetch("/expenses/");
                if (!res.ok) throw new Error();

                const data = await res.json();

                const selected = filter.value;

                const filtered = selected === "all"
                    ? data
                    : data.filter(e => e.category === selected);

                render(filtered);

            } catch (err) {
                showMessage("Failed to load expenses");
            }
        }

        // ✅ BETTER RENDER (NO innerHTML += LOOP)
        function render(expenses) {
            tableBody.innerHTML = "";

            if (!expenses.length) {
                tableBody.innerHTML = "<tr><td colspan='7'>No Data</td></tr>";
                return;
            }

            let rows = "";

            expenses.forEach(e => {
                rows += `
                    <tr>
                        <td>${e.date}</td>
                        <td>${e.time || "-"}</td>
                        <td>Rs ${e.amount}</td>
                        <td>${e.category}</td>
                        <td>${e.where_spent}</td>
                        <td>${e.payment_method || "-"}</td>
                        <td>
                            <button onclick="deleteExpense(${e.id})">Delete</button>
                        </td>
                    </tr>
                `;
            });

            tableBody.innerHTML = rows;
        }

        // ✅ FORM SUBMIT (ALREADY GOOD — JUST CLEANED)
        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const payment = document.getElementById("paymentMethod").value;

            if (!payment) {
                showMessage("Please select payment method");
                return;
            }

            const data = {
                date: document.getElementById("date").value,
                time: document.getElementById("time").value,
                amount: document.getElementById("amount").value,
                category: document.getElementById("useType").value,
                whereSpent: document.getElementById("whereSpent").value,
                paymentMethod: payment
            };

            try {
                const res = await fetch("/expenses/", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data)
                });

                const result = await res.json();

                if (!res.ok) {
                    showMessage(result.error || "Error adding expense");
                    return;
                }

                showMessage("Expense Added");
                form.reset();

                // reset date again after reset
                document.getElementById("date").value =
                    new Date().toISOString().split('T')[0];

                fetchExpenses();
                loadInsights();

            } catch (err) {
                showMessage("Server error");
            }
        });

        // ✅ DELETE (ALREADY GOOD — JUST SAFE)
        async function deleteExpense(id) {
            const confirmDelete = confirm("Are you sure you want to delete this expense?");
            if (!confirmDelete) return;

            try {
                const res = await fetch(`/expenses/${id}/`, {
                    method: "DELETE"
                });

                if (res.ok) {
                    showMessage("Deleted");
                } else {
                    showMessage("Delete failed");
                }

                fetchExpenses();
                loadInsights();

            } catch (err) {
                showMessage("Server error");
            }
        }

        filter.addEventListener("change", fetchExpenses);

        // ✅ INSIGHTS (ADD ERROR HANDLING)
        async function loadInsights() {
            try {
                const res = await fetch("/insights/");
                if (!res.ok) throw new Error();

                const data = await res.json();

                document.getElementById("insightsBox").innerHTML = `
                    <h3>AI Insights</h3>
                    <p>Total: Rs ${data.total}</p>
                    <p>${data.insight}</p>
                `;
            } catch (err) {
                showMessage("Failed to load insights");
            }
        }

        // ✅ DEFAULT DATE
        document.getElementById("date").value =
            new Date().toISOString().split('T')[0];

        // INIT
        fetchExpenses();
        loadInsights();
    </script>

</body>

</html>
