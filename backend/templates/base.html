<!-- templates/base.html -->

{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Smart Ledger{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    {% block head_extra %}{% endblock %}
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="/" class="logo">💼 Smart Ledger</a>

            <ul class="nav-list">
                <li class="nav-item">
                    <a href="/" class="{% block nav_home %}{% endblock %}">
                        🏠 Home
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/dashboard/" class="{% block nav_dashboard %}{% endblock %}">
                        📊 Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/rosca/" class="{% block nav_rosca %}{% endblock %}">
                        🤝 ROSCA
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/login/" class="{% block nav_login %}{% endblock %}">
                        🔐 Login
                    </a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- PAGE CONTENT -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}

</body>

</html>
